name: any_image_view
version: 2.2.0

description: "A versatile Flutter image viewer supporting PNG, JPG, WebP, GIF, AVIF, TIFF, RAW, SVG, Lottie, XFile, and network images with best resolution — all in one seamless package."
topics:
  - image-viewer
  - svg
  - lottie
  - image

homepage: https://farhansadikgalib.com/
repository: https://github.com/farhansadikgalib/any_image_view
issue_tracker: https://github.com/farhansadikgalib/any_image_view/issues
documentation: https://pub.dev/documentation/any_image_view/latest/

screenshots:
  - description: "any image view"
    path: raw/banner.png

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  lottie: ^3.3.3
  flutter_svg: ^2.3.0
  flutter_avif: ^3.1.0
  cached_network_image: ^3.4.1
  cross_file: ^0.3.5+2
  http: ^1.6.0

  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
